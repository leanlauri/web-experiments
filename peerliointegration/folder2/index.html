      :root {

      * {

      body {
        margin: 0;

        font-family: "Nunito", sans-serif;

      .content {

        word-break: break-word;
        background: #f6fbff;
        border: 1px solid #c7ddf4;
        border-radius: 16px;
        padding: 16px;
        font-size: 0.9rem;
        line-height: 1.45;
      }
